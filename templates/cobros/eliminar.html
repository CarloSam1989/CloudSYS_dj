{% extends "cobros/base_cobros.html" %}

{% block content %}

<h2>Confirmar eliminación</h2>

<p>¿Seguro que deseas eliminar el cobro de {{ cobro.cliente }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Eliminar</button>
    <a href="{% url 'cobros:lista_cobros' %}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
